<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Semsem Hard 30</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0E0F12" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{--bg:#0E0F12;--surface:#171920;--text:#F4F6F0;--acid:#BFFF3C;--muted:#8B919E;--good:#3CE08A;--flame:#FF6B3C;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:"Tajawal",sans-serif;min-height:100vh;}
  h1,h2,h3{font-family:"Cairo",sans-serif;}
  
  /* AUTH SCREEN */
  #authScreen{
    position:fixed;inset:0;background:linear-gradient(160deg,#0a0b0e,#151820);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  #authScreen.hidden{display:none;}
  .auth-card{
    background:linear-gradient(160deg,#1f2229,#16191f);border:1.5px solid rgba(191,255,60,.15);
    border-radius:28px;padding:40px 28px;max-width:400px;width:100%;box-shadow:0 25px 80px rgba(0,0,0,.6);
  }
  .auth-card h2{font-size:32px;margin:0 0 8px;text-align:center;color:var(--acid);}
  .auth-card .sub{color:var(--muted);text-align:center;margin-bottom:30px;font-size:14px;line-height:1.8;}
  
  .auth-input{
    width:100%;background:rgba(33,36,46,.6);border:1.5px solid rgba(45,49,60,.8);
    color:var(--text);border-radius:12px;padding:13px 16px;font-size:15px;
    margin-bottom:11px;outline:none;transition:all .2s;
  }
  .auth-input:focus{border-color:var(--acid);box-shadow:0 0 16px rgba(191,255,60,.2);}
  
  .auth-btn{
    width:100%;background:linear-gradient(135deg,#BFFF3C,#8ad21f);color:#0a0b0e;
    border:none;border-radius:12px;font-family:"Cairo";font-weight:900;font-size:15px;
    padding:14px;cursor:pointer;margin-bottom:10px;transition:all .2s;
  }
  .auth-btn:active{transform:scale(.97);}
  .auth-err{color:var(--flame);font-size:12px;margin:10px 0;text-align:center;display:none;}
  .auth-err.show{display:block;}
  
  /* MAIN APP */
  #appContainer{display:none;}
  #appContainer.active{display:block;}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 140px;}
  
  header{padding:20px 0 0;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .brand .mark{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--acid),#8ad21f);color:#11140a;font-family:"Cairo";font-weight:900;font-size:20px;display:grid;place-items:center;}
  .brand h1{margin:0;font-size:20px;font-weight:900;}
  .brand .sub{color:var(--muted);font-size:12px;margin:0;}
  
  .progress-card{background:#171920;border:1px solid #2D313C;border-radius:18px;padding:16px;margin-bottom:20px;}
  .pc-top{display:flex;justify-content:space-between;}
  .pc-day{font-family:"Cairo";font-weight:900;}
  .pc-day b{color:var(--acid);font-size:28px;}
  .pc-stat{color:var(--muted);font-size:12px;text-align:right;}
  .pc-stat b{display:block;color:var(--text);font-size:16px;font-family:"Cairo";}
  .bar{height:8px;background:#21242E;border-radius:99px;margin-top:12px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--acid),#8ad21f);border-radius:99px;transition:width .4s;}
  
  .task{background:#171920;border:1px solid #2D313C;border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px;align-items:center;}
  .task.done{border-color:#7e9f2a;background:rgba(191,255,60,.05);}
  .task .ic{font-size:24px;flex:none;}
  .task .info{flex:1;}
  .task .title{font-family:"Cairo";font-weight:700;font-size:15px;}
  .task .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  
  .check{width:32px;height:32px;border-radius:50%;border:2px solid #2D313C;background:transparent;cursor:pointer;display:grid;place-items:center;transition:all .2s;}
  .check.on{background:var(--acid);border-color:var(--acid);}
  .check svg{width:16px;height:16px;stroke:#11140a;stroke-width:3;fill:none;opacity:0;transform:scale(.4);transition:.2s;}
  .check.on svg{opacity:1;transform:scale(1);}
  
  .input-num{width:60px;background:#21242E;border:1px solid #2D313C;color:var(--text);border-radius:8px;padding:6px;text-align:center;outline:none;}
  
  .tab-bar{
    position:fixed;bottom:0;left:0;right:0;background:rgba(14,15,18,.9);backdrop-filter:blur(16px);
    border-top:1px solid #2D313C;display:flex;z-index:20;padding:8px;
  }
  .tab{flex:1;background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;transition:all .2s;}
  .tab.active{color:var(--acid);}
  
  .view{display:none;}
  .view.active{display:block;animation:fadeIn .3s;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  
  .word-box{background:#21242E;padding:10px;border-radius:10px;margin-bottom:8px;font-size:13px;}
  .word-box b{color:var(--acid);}
  .word-box .del{float:left;background:none;border:none;color:var(--flame);cursor:pointer;font-weight:700;}
  
  .btn-logout{width:100%;background:var(--flame);color:#fff;border:none;border-radius:10px;padding:12px;font-family:"Cairo";font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-card">
    <h2>Semsem Hard 30</h2>
    <p class="sub">التحدي بتاعك 💪</p>
    
    <input class="auth-input" id="pass" type="password" placeholder="كلمة المرور" />
    <button class="auth-btn" onclick="login()">دخول</button>
    
    <div class="auth-err" id="err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="appContainer">
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="mark">30</div>
        <div>
          <h1>Semsem <span style="color:var(--acid)">Hard 30</span></h1>
          <p class="sub">التحدي بتاعك 💪</p>
        </div>
      </div>
      
      <div class="progress-card">
        <div class="pc-top">
          <div class="pc-day">اليوم <b id="dayNum">1</b><br>من ٣٠</div>
          <div class="pc-stat">مكتملة<b id="done">0</b></div>
        </div>
        <div class="bar"><i id="bar" style="width:0%"></i></div>
      </div>
    </header>

    <!-- TODAY VIEW -->
    <section class="view active" id="todayView">
      <div class="task">
        <div class="ic">🏋️</div>
        <div class="info">
          <div class="title">تمرين</div>
          <div class="sub">workout واحد على الأقل</div>
        </div>
        <button class="check" id="ck1" onclick="toggle('workout')"><svg viewBox="0 0 24 24"><polyline points="5 13 10 18 19 6"/></svg></button>
      </div>
      
      <div class="task">
        <div class="ic">🇩🇪</div>
        <div class="info">
          <div class="title">١٠ كلمات ألماني</div>
          <div class="sub">مع الجمل بتاعتها</div>
        </div>
        <div style="margin-inline-start:auto;font-family:Cairo;font-weight:700;color:var(--acid);" id="wcount">0/10</div>
      </div>
      <div style="background:#171920;border:1px solid #2D313C;border-radius:12px;padding:12px;margin-bottom:12px;">
        <input id="de" placeholder="كلمة ألماني" style="width:100%;background:transparent;border:none;color:var(--text);outline:none;margin-bottom:8px;font-size:14px;" />
        <input id="sn" placeholder="جملة" style="width:100%;background:transparent;border:none;color:var(--text);outline:none;font-size:14px;" />
        <button class="auth-btn" style="margin:12px 0 0;" onclick="addWord()">+ ضيف</button>
      </div>
      <div id="words"></div>
      
      <div class="task">
        <div class="ic">📖</div>
        <div class="info">
          <div class="title">١٠ صفحات</div>
          <div class="sub">من الكتاب</div>
        </div>
        <button class="check" id="ck2" onclick="toggle('pages')"><svg viewBox="0 0 24 24"><polyline points="5 13 10 18 19 6"/></svg></button>
      </div>
      
      <div class="task">
        <div class="ic">💧</div>
        <div class="info">
          <div class="title">٢ لتر مية</div>
          <div class="sub">٨ كاسات</div>
        </div>
        <button class="check" id="ck3" onclick="toggle('water')"><svg viewBox="0 0 24 24"><polyline points="5 13 10 18 19 6"/></svg></button>
      </div>
      
      <div class="task">
        <div class="ic">⚖️</div>
        <div class="info">
          <div class="title">وزنك</div>
          <div class="sub">كل يوم</div>
        </div>
        <input id="weight" type="number" step="0.1" placeholder="75" class="input-num" onchange="saveWeight()" />
      </div>
    </section>

    <!-- SETTINGS VIEW -->
    <section class="view" id="settingsView" style="padding-top:20px;">
      <h2 style="font-size:20px;margin:0 0 16px;">الإعدادات</h2>
      <div style="background:#171920;border:1px solid #2D313C;border-radius:16px;padding:16px;">
        <p style="color:var(--muted);font-size:13px;margin:0;">كل البيانات محفوظة على التليفون بتاعك 📱</p>
        <button class="btn-logout" onclick="logout()">تسجيل خروج 🚪</button>
      </div>
    </section>
  </div>

  <!-- TAB BAR -->
  <nav class="tab-bar">
    <button class="tab active" onclick="switchView('today')">📋 اليوم</button>
    <button class="tab" onclick="switchView('settings')">⚙️ الإعدادات</button>
  </nav>
</div>

<script>
let data = {}, today, logged = false;

// Load from localStorage
function load() {
  const saved = localStorage.getItem('semsem30');
  if(saved) data = JSON.parse(saved);
  today = new Date().toISOString().split('T')[0];
}

// Save to localStorage
function save() {
  localStorage.setItem('semsem30', JSON.stringify(data));
}

// Check login
function login() {
  const pass = document.getElementById("pass").value;
  if(pass !== "Bishoy30") {
    const err = document.getElementById("err");
    err.textContent = "كلمة المرور خاطئة";
    err.classList.add("show");
    setTimeout(() => err.classList.remove("show"), 2000);
    return;
  }
  
  localStorage.setItem('semsem30_logged', 'true');
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("appContainer").classList.add("active");
  load();
  render();
}

// Logout
function logout() {
  if(confirm("تسجيل خروج؟")) {
    localStorage.removeItem('semsem30_logged');
    document.getElementById("authScreen").classList.remove("hidden");
    document.getElementById("appContainer").classList.remove("active");
    document.getElementById("pass").value = "";
  }
}

// Toggle task
function toggle(k) {
  data[today] = data[today] || {};
  data[today][k] = !data[today][k];
  save();
  render();
}

// Add word
function addWord() {
  const de = document.getElementById("de").value;
  const sn = document.getElementById("sn").value;
  if(!de || !sn) return;
  
  data[today] = data[today] || {};
  data[today].words = data[today].words || [];
  if(data[today].words.length < 10) {
    data[today].words.push({de, sn});
    save();
    document.getElementById("de").value = "";
    document.getElementById("sn").value = "";
    render();
  }
}

// Delete word
function delWord(i) {
  data[today].words.splice(i, 1);
  save();
  render();
}

// Save weight
function saveWeight() {
  const w = parseFloat(document.getElementById("weight").value);
  if(!isNaN(w)) {
    data[today] = data[today] || {};
    data[today].weight = w;
    save();
  }
}

// Switch view
function switchView(v) {
  document.querySelectorAll(".view").forEach(x => x.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.getElementById(v+"View").classList.add("active");
  event.target.classList.add("active");
}

// Render
function render() {
  const d = data[today] || {};
  
  document.getElementById("ck1").classList.toggle("on", d.workout);
  document.getElementById("ck2").classList.toggle("on", d.pages);
  document.getElementById("ck3").classList.toggle("on", d.water);
  
  const w = d.words || [];
  document.getElementById("wcount").textContent = w.length + "/10";
  document.getElementById("words").innerHTML = w.map((x,i) => `
    <div class="word-box"><b>${x.de}</b> — ${x.sn} <button class="del" onclick="delWord(${i})">×</button></div>
  `).join("");
  
  if(d.weight) document.getElementById("weight").value = d.weight;
  
  let done = 0;
  Object.keys(data).forEach(day => {
    const dd = data[day];
    if(dd.workout && dd.pages && dd.water && dd.weight && dd.words && dd.words.length >= 10) done++;
  });
  
  document.getElementById("done").textContent = done;
  document.getElementById("bar").style.width = (done/30)*100 + "%";
  document.getElementById("dayNum").textContent = Object.keys(data).length;
}

// Init
load();
if(localStorage.getItem('semsem30_logged')) {
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("appContainer").classList.add("active");
  render();
} else {
  document.getElementById("authScreen").classList.remove("hidden");
  document.getElementById("appContainer").classList.remove("active");
}
</script>
</body>
</html>
